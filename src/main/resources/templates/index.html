<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Salón Belleza</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" th:href="@{/css/estilos.css}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>

        <nav class="navbar navbar-expand-lg navbar-light bg-cafe shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" th:href="@{/}">Salón Belleza</a>

                <div class="ms-auto d-flex gap-3">
                    <a class="nav-link" th:href="@{/reservas}">Reservas</a>
                    <a class="nav-link" th:href="@{/servicios}">Servicios</a>
                    <a class="nav-link" th:href="@{/categorias}">Categorías</a>
                    <a class="nav-link" th:href="@{/contacto}">Contáctenos</a>
                </div>
            </div>
        </nav>
        <div class="container mt-5">

            <h2 class="text-center mb-4">Nuestros Servicios</h2>

            <div class="row g-4">

                <div class="col-md-4">
                    <div class="card">
                        <img src="https://images.unsplash.com/photo-1600948836101-f9ffda59d250" class="card-img-top">
                        <div class="card-body text-center">
                            <h5 class="card-title">Nuestros servicios</h5>
                            <p class="text-muted">Conozca de nuestros servicios, unisex</p>
                            <button class="btn btn-success">Reservar</button>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card">
                        <img src="https://images.unsplash.com/photo-1582095133179-bfd08e2fc6b3" class="card-img-top">
                        <div class="card-body text-center">
                            <h5 class="card-title">Servicio profesional de peluquería</h5>
                            <p class="text-muted">Estilo personalizado</p>
                            <button class="btn btn-success">Reservar</button>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card">
                        <img src="https://images.unsplash.com/photo-1595475038784-bbe439ff41e6" class="card-img-top">
                        <div class="card-body text-center">
                            <h5 class="card-title">Peluqueria para caballeros</h5>
                            <p class="text-muted">Formalidad y elegancia</p>
                            <button class="btn btn-success">Reservar</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </body>
</html>
